<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>Catch the Dots</title>
<style>
body{margin:0;overflow:hidden;background-color:#111;color:#fff;font-family:sans-serif;}
canvas{display:block;}
#ui{position:absolute;top:20px;left:20px;pointer-events:none;font-size:18px;}
</style>
</head>
<body>
<div id="ui">分數: <span id="score">0</span></div>
<canvas id="gameCanvas"></canvas>
<script>
const canvas=document.getElementById('gameCanvas');
const ctx=canvas.getContext('2d');
const scoreEl=document.getElementById('score');
canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

let score=0;
let targets=[];

class Target{
    constructor(){
        this.radius=Math.random()*20+15;
        this.x=Math.random()*(canvas.width-this.radius*2)+this.radius;
        this.y=Math.random()*(canvas.height-this.radius*2)+this.radius;
        this.dx=(Math.random()-0.5)*3;
        this.dy=(Math.random()-0.5)*3;
        this.color=`hsl(${Math.random()*360},80%,60%)`;
    }
    update(){
        this.x+=this.dx;
        this.y+=this.dy;
        if(this.x+this.radius>canvas.width || this.x-this.radius<0) this.dx*=-1;
        if(this.y+this.radius>canvas.height || this.y-this.radius<0) this.dy*=-1;
    }
    draw(){
        ctx.beginPath();
        ctx.arc(this.x,this.y,this.radius,0,Math.PI*2);
        ctx.fillStyle=this.color;
        ctx.fill();
        ctx.closePath();
    }
}

function init(){
    for(let i=0;i<8;i++) targets.push(new Target());
}

canvas.addEventListener('mousemove',function(e){
    const mouseX=e.clientX;
    const mouseY=e.clientY;
    for(let i=targets.length-1;i>=0;i--){
        const t=targets[i];
        const dist=Math.hypot(mouseX-t.x,mouseY-t.y);
        if(dist<t.radius){
            targets.splice(i,1);
            score+=10;
            scoreEl.innerText=score;
            targets.push(new Target());
        }
    }
});

function animate(){
    requestAnimationFrame(animate);
    ctx.fillStyle='rgba(17,17,17,0.3)';
    ctx.fillRect(0,0,canvas.width,canvas.height);
    for(let i=0;i<targets.length;i++){
        targets[i].update();
        targets[i].draw();
    }
}

init();
animate();

window.addEventListener('resize',function(){
    canvas.width=window.innerWidth;
    canvas.height=window.innerHeight;
});
</script>
</body>
</html>
