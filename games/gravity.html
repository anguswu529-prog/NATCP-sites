<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<style>
body{margin:0;overflow:hidden;background-color:#2c3e50;font-family:sans-serif;}
canvas{display:block;}
#ui{position:absolute;top:20px;left:20px;font-size:24px;font-weight:bold;color:#ecf0f1;pointer-events:none;}
.screen{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:32px;color:#ecf0f1;text-align:center;pointer-events:none;}
#gameOver{display:none;}
#instruction{position:absolute;bottom:20px;width:100%;text-align:center;font-size:16px;color:#bdc3c7;pointer-events:none;}
</style>
</head>
<body>
<div id="ui">Score: <span id="score">0</span></div>
<div id="readyScreen" class="screen">Ready?<br><span style="font-size:20px">點擊畫面開始</span></div>
<div id="gameOver" class="screen">Game Over<br><span style="font-size:20px">點擊畫面重置</span></div>
<div id="instruction">操作教學：點擊畫面或按空白鍵反轉重力，躲避障礙物</div>
<canvas id="gameCanvas"></canvas>
<script>
const canvas=document.getElementById('gameCanvas');
const ctx=canvas.getContext('2d');
const scoreEl=document.getElementById('score');
const readyEl=document.getElementById('readyScreen');
const gameOverEl=document.getElementById('gameOver');
canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

let state='READY';
let score=0;
let frames=0;
let obstacles=[];
let gravityVal=0.8;
let player={x:canvas.width*0.2,y:canvas.height-40,w:30,h:30,vy:0,gravity:gravityVal};

class Obstacle{
constructor(){
this.w=40;
this.h=Math.random()*60+40;
this.x=canvas.width;
this.isTop=Math.random()>0.5;
this.y=this.isTop?0:canvas.height-this.h;
this.speed=6+(score*0.1);
this.passed=false;
}
update(){
this.x-=this.speed;
}
draw(){
ctx.fillStyle='#e74c3c';
ctx.fillRect(this.x,this.y,this.w,this.h);
}
}

function resetGame(){
obstacles=[];
score=0;
scoreEl.innerText=score;
frames=0;
player.y=canvas.height-player.h;
player.vy=0;
player.gravity=gravityVal;
state='READY';
gameOverEl.style.display='none';
readyEl.style.display='block';
}

function handleInput(){
if(state==='READY'){
state='PLAYING';
readyEl.style.display='none';
}else if(state==='GAMEOVER'){
resetGame();
}else if(state==='PLAYING'){
player.gravity*=-1;
}
}

window.addEventListener('mousedown',handleInput);
window.addEventListener('touchstart',handleInput);
window.addEventListener('keydown',function(e){
if(e.code==='Space') handleInput();
});

function checkCollision(r1,r2){
return r1.x<r2.x+r2.w&&r1.x+r1.w>r2.x&&r1.y<r2.y+r2.h&&r1.y+r1.h>r2.y;
}

function animate(){
requestAnimationFrame(animate);
ctx.fillStyle='#2c3e50';
ctx.fillRect(0,0,canvas.width,canvas.height);

if(state==='PLAYING'){
frames++;
let spawnRate=Math.max(30,80-Math.floor(score/2));
if(frames%spawnRate===0) obstacles.push(new Obstacle());

player.vy+=player.gravity;
player.y+=player.vy;

if(player.y<=0){
player.y=0;
player.vy=0;
}else if(player.y+player.h>=canvas.height){
player.y=canvas.height-player.h;
player.vy=0;
}

for(let i=obstacles.length-1;i>=0;i--){
obstacles[i].update();
obstacles[i].draw();

if(checkCollision(player,obstacles[i])){
state='GAMEOVER';
gameOverEl.style.display='block';
}

if(obstacles[i].x+obstacles[i].w<player.x&&!obstacles[i].passed){
score++;
scoreEl.innerText=score;
obstacles[i].passed=true;
}

if(obstacles[i].x+obstacles[i].w<0) obstacles.splice(i,1);
}
}else if(state==='GAMEOVER'){
for(let i=0;i<obstacles.length;i++) obstacles[i].draw();
}

ctx.fillStyle='#1abc9c';
ctx.fillRect(player.x,player.y,player.w,player.h);
}

animate();

window.addEventListener('resize',function(){
canvas.width=window.innerWidth;
canvas.height=window.innerHeight;
if(player.gravity>0) player.y=canvas.height-player.h;
else player.y=0;
});
</script>
</body>
</html>
