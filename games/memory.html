<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<style>
body{margin:0;overflow:hidden;background-color:#2c3e50;font-family:sans-serif;}
canvas{display:block;}
#ui{position:absolute;top:20px;left:20px;font-size:24px;font-weight:bold;color:#ecf0f1;pointer-events:none;}
.screen{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:32px;color:#ecf0f1;text-align:center;pointer-events:none;}
#gameOver{display:none;}
#instruction{position:absolute;bottom:20px;width:100%;text-align:center;font-size:16px;color:#bdc3c7;pointer-events:none;}
</style>
</head>
<body>
<div id="ui">Turns: <span id="score">0</span></div>
<div id="readyScreen" class="screen">Ready?<br><span style="font-size:20px">點擊畫面開始遊戲</span></div>
<div id="gameOver" class="screen">You Win!<br><span style="font-size:20px">點擊畫面重置</span></div>
<div id="instruction">操作教學：點擊翻開卡牌，找出所有配對</div>
<canvas id="gameCanvas"></canvas>
<script>
const canvas=document.getElementById('gameCanvas');
const ctx=canvas.getContext('2d');
const scoreEl=document.getElementById('score');
const readyEl=document.getElementById('readyScreen');
const gameOverEl=document.getElementById('gameOver');
canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

let state='READY';
let score=0;
let cols=4;
let rows=4;
let cardSize=80;
let gap=10;
let startX=0;
let startY=0;
let cards=[];
let flippedCards=[];
let lockBoard=false;
let matchedPairs=0;

const colors=['#1abc9c','#3498db','#9b59b6','#f1c40f','#e67e22','#e74c3c','#16a085','#8e44ad'];

function initBoard(){
let values=[];
for(let i=0;i<(cols*rows)/2;i++){
values.push(i);
values.push(i);
}
for(let i=values.length-1;i>0;i--){
let j=Math.floor(Math.random()*(i+1));
let temp=values[i];
values[i]=values[j];
values[j]=temp;
}

cards=[];
startX=(canvas.width-(cols*(cardSize+gap)-gap))/2;
startY=(canvas.height-(rows*(cardSize+gap)-gap))/2;

let idx=0;
for(let c=0;c<cols;c++){
cards[c]=[];
for(let r=0;r<rows;r++){
cards[c][r]={
x:startX+c*(cardSize+gap),
y:startY+r*(cardSize+gap),
val:values[idx],
status:0
};
idx++;
}
}
}

function resetGame(){
score=0;
scoreEl.innerText=score;
matchedPairs=0;
flippedCards=[];
lockBoard=false;
initBoard();
state='READY';
gameOverEl.style.display='none';
readyEl.style.display='block';
}

resetGame();

function handleInput(e){
if(state==='READY'){
state='PLAYING';
readyEl.style.display='none';
return;
}else if(state==='GAMEOVER'){
resetGame();
return;
}

if(state!=='PLAYING'||lockBoard) return;

let rect=canvas.getBoundingClientRect();
let clientX=e.clientX||(e.touches?e.touches[0].clientX:0);
let clientY=e.clientY||(e.touches?e.touches[0].clientY:0);
let mouseX=clientX-rect.left;
let mouseY=clientY-rect.top;

for(let c=0;c<cols;c++){
for(let r=0;r<rows;r++){
let card=cards[c][r];
if(card.status===0&&mouseX>card.x&&mouseX<card.x+cardSize&&mouseY>card.y&&mouseY<card.y+cardSize){
card.status=1;
flippedCards.push(card);
if(flippedCards.length===2){
score++;
scoreEl.innerText=score;
checkMatch();
}
return;
}
}
}
}

function checkMatch(){
lockBoard=true;
let match=flippedCards[0].val===flippedCards[1].val;
if(match){
flippedCards[0].status=2;
flippedCards[1].status=2;
flippedCards=[];
matchedPairs++;
lockBoard=false;
if(matchedPairs===(cols*rows)/2){
state='GAMEOVER';
gameOverEl.style.display='block';
}
}else{
setTimeout(()=>{
flippedCards[0].status=0;
flippedCards[1].status=0;
flippedCards=[];
lockBoard=false;
},1000);
}
}

window.addEventListener('mousedown',handleInput);
window.addEventListener('touchstart',handleInput);

function drawBoard(){
for(let c=0;c<cols;c++){
for(let r=0;r<rows;r++){
let card=cards[c][r];
ctx.fillStyle=card.status===0?'#34495e':(card.status===2?'#7f8c8d':colors[card.val]);
ctx.fillRect(card.x,card.y,cardSize,cardSize);
if(card.status!==0){
ctx.fillStyle='#fff';
ctx.font='30px sans-serif';
ctx.textAlign='center';
ctx.textBaseline='middle';
ctx.fillText(card.val,card.x+cardSize/2,card.y+cardSize/2);
}
}
}
}

function animate(){
requestAnimationFrame(animate);
ctx.clearRect(0,0,canvas.width,canvas.height);
drawBoard();
if(state==='GAMEOVER'){
ctx.fillStyle='rgba(44,62,80,0.7)';
ctx.fillRect(0,0,canvas.width,canvas.height);
}
}

animate();

window.addEventListener('resize',function(){
canvas.width=window.innerWidth;
canvas.height=window.innerHeight;
startX=(canvas.width-(cols*(cardSize+gap)-gap))/2;
startY=(canvas.height-(rows*(cardSize+gap)-gap))/2;
for(let c=0;c<cols;c++){
for(let r=0;r<rows;r++){
cards[c][r].x=startX+c*(cardSize+gap);
cards[c][r].y=startY+r*(cardSize+gap);
}
}
});
</script>
</body>
</html>
