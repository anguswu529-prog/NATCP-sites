<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<style>
body{margin:0;overflow:hidden;background-color:#111;font-family:sans-serif;user-select:none;touch-action:none;}
canvas{display:block;cursor:crosshair;}
#ui{position:absolute;top:20px;left:20px;font-size:24px;font-weight:bold;color:#fff;pointer-events:none;}
.screen{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:32px;color:#fff;text-align:center;pointer-events:none;}
#gameOver{display:none;}
#instruction{position:absolute;bottom:20px;width:100%;text-align:center;font-size:16px;color:#888;pointer-events:none;}
</style>
</head>
<body>
<div id="ui">Score: <span id="score">0</span></div>
<div id="readyScreen" class="screen">Ready?<br><span style="font-size:20px">點擊畫面開始</span></div>
<div id="gameOver" class="screen">Game Over<br><span style="font-size:20px">點擊畫面重置</span></div>
<div id="instruction">操作教學：按住左鍵拖曳切割藍色目標，漏接或切到紅色炸彈即失敗</div>
<canvas id="gameCanvas"></canvas>
<script>
const canvas=document.getElementById('gameCanvas');
const ctx=canvas.getContext('2d');
const scoreEl=document.getElementById('score');
const readyEl=document.getElementById('readyScreen');
const gameOverEl=document.getElementById('gameOver');
canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

let state='READY';
let score=0;
let frames=0;
let targets=[];
let trail=[];
let particles=[];
let mouse={x:0,y:0,down:false};
let lastMouse={x:0,y:0};

class Particle{
constructor(x,y,color){
this.x=x;
this.y=y;
this.vx=(Math.random()-0.5)*10;
this.vy=(Math.random()-0.5)*10;
this.r=Math.random()*4+2;
this.color=color;
this.life=1;
}
update(){
this.vy+=0.4;
this.x+=this.vx;
this.y+=this.vy;
this.life-=0.03;
}
draw(){
ctx.save();
ctx.globalAlpha=Math.max(0,this.life);
ctx.fillStyle=this.color;
ctx.beginPath();
ctx.arc(this.x,this.y,this.r,0,Math.PI*2);
ctx.fill();
ctx.restore();
}
}

class Target{
constructor(){
this.r=25+Math.random()*15;
this.x=Math.random()*canvas.width;
this.y=canvas.height+this.r;
this.vx=(canvas.width/2-this.x)*0.015+(Math.random()-0.5)*4;
this.vy=-(Math.random()*4+14+(score*0.05));
this.isBomb=Math.random()>0.75;
this.gravity=0.25;
this.shape=Math.floor(Math.random()*5);
this.angle=Math.random()*Math.PI*2;
this.spin=(Math.random()-0.5)*0.2;
}
update(){
this.vy+=this.gravity;
this.x+=this.vx;
this.y+=this.vy;
this.angle+=this.spin;
}
draw(){
ctx.save();
ctx.translate(this.x,this.y);
ctx.rotate(this.angle);
ctx.beginPath();
if(this.shape===0){
ctx.arc(0,0,this.r,0,Math.PI*2);
}else if(this.shape===1){
let s=this.r*0.8;
ctx.rect(-s,-s,s*2,s*2);
}else if(this.shape===2){
ctx.moveTo(0,-this.r);
ctx.lineTo(this.r*0.866,this.r*0.5);
ctx.lineTo(-this.r*0.866,this.r*0.5);
}else if(this.shape===3){
for(let i=0;i<5;i++) ctx.lineTo(Math.cos(i*2*Math.PI/5-Math.PI/2)*this.r,Math.sin(i*2*Math.PI/5-Math.PI/2)*this.r);
}else if(this.shape===4){
for(let i=0;i<10;i++) ctx.lineTo(Math.cos(i*Math.PI/5-Math.PI/2)*(i%2===0?this.r:this.r*0.4),Math.sin(i*Math.PI/5-Math.PI/2)*(i%2===0?this.r:this.r*0.4));
}
ctx.closePath();
ctx.fillStyle=this.isBomb?'#e74c3c':'#3498db';
ctx.fill();
ctx.restore();
}
}

function distToSegment(px,py,x1,y1,x2,y2){
let dx=x2-x1;
let dy=y2-y1;
let l2=dx*dx+dy*dy;
if(l2===0) return Math.hypot(px-x1,py-y1);
let t=((px-x1)*dx+(py-y1)*dy)/l2;
t=Math.max(0,Math.min(1,t));
return Math.hypot(px-(x1+t*dx),py-(y1+t*dy));
}

function resetGame(){
targets=[];
trail=[];
particles=[];
score=0;
scoreEl.innerText=score;
frames=0;
mouse.down=false;
state='READY';
gameOverEl.style.display='none';
readyEl.style.display='block';
}

function checkCuts(x1,y1,x2,y2){
if(state!=='PLAYING') return;
for(let i=targets.length-1;i>=0;i--){
let t=targets[i];
if(distToSegment(t.x,t.y,x1,y1,x2,y2)<t.r){
if(t.isBomb){
state='GAMEOVER';
gameOverEl.style.display='block';
}else{
for(let p=0;p<10;p++) particles.push(new Particle(t.x,t.y,'#3498db'));
score++;
scoreEl.innerText=score;
targets.splice(i,1);
}
}
}
}

window.addEventListener('mousedown',function(e){
if(state==='READY'){
state='PLAYING';
readyEl.style.display='none';
}else if(state==='GAMEOVER'){
resetGame();
return;
}
mouse.down=true;
mouse.x=e.clientX;
mouse.y=e.clientY;
lastMouse.x=mouse.x;
lastMouse.y=mouse.y;
trail=[];
});

window.addEventListener('mouseup',function(){
mouse.down=false;
});

window.addEventListener('mousemove',function(e){
if(mouse.down&&state==='PLAYING'){
lastMouse.x=mouse.x;
lastMouse.y=mouse.y;
mouse.x=e.clientX;
mouse.y=e.clientY;
trail.push({x:mouse.x,y:mouse.y,life:10});
checkCuts(lastMouse.x,lastMouse.y,mouse.x,mouse.y);
}
});

window.addEventListener('touchstart',function(e){
if(state==='READY'){
state='PLAYING';
readyEl.style.display='none';
}else if(state==='GAMEOVER'){
resetGame();
return;
}
mouse.down=true;
mouse.x=e.touches[0].clientX;
mouse.y=e.touches[0].clientY;
lastMouse.x=mouse.x;
lastMouse.y=mouse.y;
trail=[];
});

window.addEventListener('touchend',function(){
mouse.down=false;
});

window.addEventListener('touchmove',function(e){
if(mouse.down&&state==='PLAYING'){
lastMouse.x=mouse.x;
lastMouse.y=mouse.y;
mouse.x=e.touches[0].clientX;
mouse.y=e.touches[0].clientY;
trail.push({x:mouse.x,y:mouse.y,life:10});
checkCuts(lastMouse.x,lastMouse.y,mouse.x,mouse.y);
}
});

function animate(){
requestAnimationFrame(animate);
ctx.fillStyle='#111';
ctx.fillRect(0,0,canvas.width,canvas.height);

if(state==='PLAYING'){
frames++;
let spawnRate=Math.max(20,70-Math.floor(score/5));
if(frames%spawnRate===0) targets.push(new Target());

for(let i=targets.length-1;i>=0;i--){
targets[i].update();
targets[i].draw();
if(targets[i].y>canvas.height+targets[i].r&&targets[i].vy>0){
if(!targets[i].isBomb){
state='GAMEOVER';
gameOverEl.style.display='block';
}
targets.splice(i,1);
}
}
}else if(state==='GAMEOVER'){
for(let i=0;i<targets.length;i++) targets[i].draw();
}

for(let i=particles.length-1;i>=0;i--){
particles[i].update();
particles[i].draw();
if(particles[i].life<=0) particles.splice(i,1);
}

for(let i=0;i<trail.length;i++) trail[i].life--;
trail=trail.filter(p=>p.life>0);

if(trail.length>1){
ctx.beginPath();
ctx.moveTo(trail[0].x,trail[0].y);
for(let i=1;i<trail.length;i++) ctx.lineTo(trail[i].x,trail[i].y);
ctx.strokeStyle='rgba(236,240,241,0.8)';
ctx.lineWidth=4;
ctx.lineCap='round';
ctx.lineJoin='round';
ctx.stroke();
}
}

animate();

window.addEventListener('resize',function(){
canvas.width=window.innerWidth;
canvas.height=window.innerHeight;
});
</script>
</body>
</html>
