<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<style>
body{margin:0;overflow:hidden;background-color:#2c3e50;font-family:sans-serif;}
canvas{display:block;}
#ui{position:absolute;top:20px;left:20px;font-size:24px;font-weight:bold;color:#ecf0f1;pointer-events:none;}
.screen{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:32px;color:#ecf0f1;text-align:center;pointer-events:none;}
#gameOver{display:none;}
#instruction{position:absolute;bottom:20px;width:100%;text-align:center;font-size:16px;color:#bdc3c7;pointer-events:none;}
</style>
</head>
<body>
<div id="ui">Score: <span id="score">0</span></div>
<div id="readyScreen" class="screen">Ready?<br><span style="font-size:20px">點擊畫面發射小球</span></div>
<div id="gameOver" class="screen">Game Over<br><span style="font-size:20px">點擊畫面重置</span></div>
<div id="instruction">操作教學：移動滑鼠控制擋板，防止小球掉落</div>
<canvas id="gameCanvas"></canvas>
<script>
const canvas=document.getElementById('gameCanvas');
const ctx=canvas.getContext('2d');
const scoreEl=document.getElementById('score');
const readyEl=document.getElementById('readyScreen');
const gameOverEl=document.getElementById('gameOver');
canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

let state='READY';
let score=0;
let bricks=[];
const brickRowCount=5;
const brickColumnCount=8;
const brickPadding=10;
const brickOffsetTop=60;
const brickWidth=(canvas.width-brickOffsetTop*2)/brickColumnCount-brickPadding;
const brickHeight=20;

let paddle={w:120,h:15,x:canvas.width/2-60,y:canvas.height-40};
let ball={x:canvas.width/2,y:canvas.height-60,r:8,dx:5,dy:-5};

function initBricks(){
bricks=[];
for(let c=0;c<brickColumnCount;c++){
bricks[c]=[];
for(let r=0;r<brickRowCount;r++) bricks[c][r]={x:0,y:0,status:1};
}
}

function resetGame(){
score=0;
scoreEl.innerText=score;
paddle.x=canvas.width/2-paddle.w/2;
ball.x=canvas.width/2;
ball.y=paddle.y-ball.r-5;
ball.dx=5;
ball.dy=-5;
initBricks();
state='READY';
gameOverEl.style.display='none';
readyEl.style.display='block';
}

initBricks();

window.addEventListener('mousemove',function(e){
let relativeX=e.clientX;
if(relativeX>0&&relativeX<canvas.width){
paddle.x=relativeX-paddle.w/2;
if(state==='READY') ball.x=relativeX;
}
});

function handleInput(){
if(state==='READY'){
state='PLAYING';
readyEl.style.display='none';
}else if(state==='GAMEOVER'){
resetGame();
}
}

window.addEventListener('mousedown',handleInput);
window.addEventListener('touchstart',handleInput);

function collisionDetection(){
for(let c=0;c<brickColumnCount;c++){
for(let r=0;r<brickRowCount;r++){
let b=bricks[c][r];
if(b.status===1){
if(ball.x+ball.r>b.x&&ball.x-ball.r<b.x+brickWidth&&ball.y+ball.r>b.y&&ball.y-ball.r<b.y+brickHeight){
ball.dy=-ball.dy;
b.status=0;
score++;
scoreEl.innerText=score;
if(score===brickRowCount*brickColumnCount){
state='GAMEOVER';
gameOverEl.innerHTML='You Win!<br><span style="font-size:20px">點擊畫面重置</span>';
gameOverEl.style.display='block';
}
}
}
}
}
}

function drawBricks(){
for(let c=0;c<brickColumnCount;c++){
for(let r=0;r<brickRowCount;r++){
if(bricks[c][r].status===1){
let brickX=(c*(brickWidth+brickPadding))+brickOffsetTop;
let brickY=(r*(brickHeight+brickPadding))+brickOffsetTop;
bricks[c][r].x=brickX;
bricks[c][r].y=brickY;
ctx.fillStyle='#e74c3c';
ctx.fillRect(brickX,brickY,brickWidth,brickHeight);
}
}
}
}

function animate(){
requestAnimationFrame(animate);
ctx.clearRect(0,0,canvas.width,canvas.height);

if(state==='READY'){
ctx.fillStyle='#3498db';
ctx.fillRect(paddle.x,paddle.y,paddle.w,paddle.h);
ctx.beginPath();
ctx.arc(ball.x,paddle.y-ball.r,ball.r,0,Math.PI*2);
ctx.fillStyle='#ecf0f1';
ctx.fill();
drawBricks();
}else if(state==='PLAYING'){
drawBricks();

ctx.fillStyle='#3498db';
ctx.fillRect(paddle.x,paddle.y,paddle.w,paddle.h);

ctx.beginPath();
ctx.arc(ball.x,ball.y,ball.r,0,Math.PI*2);
ctx.fillStyle='#ecf0f1';
ctx.fill();

collisionDetection();

if(ball.x+ball.dx>canvas.width-ball.r||ball.x+ball.dx<ball.r) ball.dx=-ball.dx;
if(ball.y+ball.dy<ball.r) ball.dy=-ball.dy;

if(ball.y+ball.dy+ball.r>=paddle.y&&ball.y+ball.dy-ball.r<=paddle.y+paddle.h&&ball.x+ball.r>=paddle.x&&ball.x-ball.r<=paddle.x+paddle.w){
ball.dy=-Math.abs(ball.dy);
ball.dx=5*((ball.x-(paddle.x+paddle.w/2))/paddle.w);
}else if(ball.y+ball.dy>canvas.height-ball.r){
state='GAMEOVER';
gameOverEl.innerHTML='Game Over<br><span style="font-size:20px">點擊畫面重置</span>';
gameOverEl.style.display='block';
}

ball.x+=ball.dx;
ball.y+=ball.dy;
}else if(state==='GAMEOVER'){
drawBricks();
ctx.fillStyle='#3498db';
ctx.fillRect(paddle.x,paddle.y,paddle.w,paddle.h);
}
}

animate();

window.addEventListener('resize',function(){
canvas.width=window.innerWidth;
canvas.height=window.innerHeight;
paddle.y=canvas.height-40;
if(state==='READY') ball.y=paddle.y-ball.r-5;
});
</script>
</body>
</html>
