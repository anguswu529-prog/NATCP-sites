<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<style>
body{margin:0;overflow:hidden;background-color:#1a1a2e;font-family:sans-serif;}
canvas{display:block;}
#ui{position:absolute;top:20px;left:20px;font-size:24px;font-weight:bold;color:#e94560;pointer-events:none;}
.screen{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:32px;color:#e94560;text-align:center;pointer-events:none;}
#gameOver{display:none;}
#instruction{position:absolute;bottom:20px;width:100%;text-align:center;font-size:16px;color:#0f3460;pointer-events:none;}
</style>
</head>
<body>
<div id="ui">Score: <span id="score">0</span></div>
<div id="readyScreen" class="screen">Ready?<br><span style="font-size:20px">點擊畫面開始生存</span></div>
<div id="gameOver" class="screen">Game Over<br><span style="font-size:20px">點擊畫面重置</span></div>
<div id="instruction">操作教學：移動游標控制藍點，躲避所有紅色彈幕</div>
<canvas id="gameCanvas"></canvas>
<script>
const canvas=document.getElementById('gameCanvas');
const ctx=canvas.getContext('2d');
const scoreEl=document.getElementById('score');
const readyEl=document.getElementById('readyScreen');
const gameOverEl=document.getElementById('gameOver');
canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

let state='READY';
let score=0;
let frames=0;
let bullets=[];
let player={x:canvas.width/2,y:canvas.height/2,r:12};

class Bullet{
constructor(){
this.r=6+Math.random()*6;
let edge=Math.floor(Math.random()*4);
if(edge===0){
this.x=Math.random()*canvas.width;
this.y=-this.r;
}else if(edge===1){
this.x=canvas.width+this.r;
this.y=Math.random()*canvas.height;
}else if(edge===2){
this.x=Math.random()*canvas.width;
this.y=canvas.height+this.r;
}else{
this.x=-this.r;
this.y=Math.random()*canvas.height;
}
let angle=Math.atan2(player.y-this.y,player.x-this.x);
let speed=3+Math.random()*3+(score*0.001);
this.dx=Math.cos(angle)*speed;
this.dy=Math.sin(angle)*speed;
}
update(){
this.x+=this.dx;
this.y+=this.dy;
}
draw(){
ctx.beginPath();
ctx.arc(this.x,this.y,this.r,0,Math.PI*2);
ctx.fillStyle='#e94560';
ctx.fill();
}
}

function resetGame(){
bullets=[];
score=0;
scoreEl.innerText=score;
frames=0;
player.x=canvas.width/2;
player.y=canvas.height/2;
state='READY';
gameOverEl.style.display='none';
readyEl.style.display='block';
}

window.addEventListener('mousemove',function(e){
if(state==='PLAYING'||state==='READY'){
player.x=e.clientX;
player.y=e.clientY;
}
});

function handleInput(){
if(state==='READY'){
state='PLAYING';
readyEl.style.display='none';
}else if(state==='GAMEOVER'){
resetGame();
}
}

window.addEventListener('mousedown',handleInput);
window.addEventListener('touchstart',handleInput);

function animate(){
requestAnimationFrame(animate);
ctx.fillStyle='rgba(26,26,46,0.3)';
ctx.fillRect(0,0,canvas.width,canvas.height);

ctx.beginPath();
ctx.arc(player.x,player.y,player.r,0,Math.PI*2);
ctx.fillStyle='#43aa8b';
ctx.fill();

if(state==='PLAYING'){
score++;
scoreEl.innerText=score;
frames++;

let spawnRate=Math.max(10,60-Math.floor(score/100));
if(frames%spawnRate===0) bullets.push(new Bullet());

for(let i=bullets.length-1;i>=0;i--){
bullets[i].update();
bullets[i].draw();

let dist=Math.hypot(player.x-bullets[i].x,player.y-bullets[i].y);
if(dist<player.r+bullets[i].r){
state='GAMEOVER';
gameOverEl.style.display='block';
}

if(bullets[i].x<-100||bullets[i].x>canvas.width+100||bullets[i].y<-100||bullets[i].y>canvas.height+100){
bullets.splice(i,1);
}
}
}else if(state==='GAMEOVER'){
for(let i=0;i<bullets.length;i++) bullets[i].draw();
}
}

animate();

window.addEventListener('resize',function(){
canvas.width=window.innerWidth;
canvas.height=window.innerHeight;
if(state==='READY'){
player.x=canvas.width/2;
player.y=canvas.height/2;
}
});
</script>
</body>
</html>
